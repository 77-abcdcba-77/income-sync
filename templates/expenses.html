{% extends "base.html" %}
{% block title %}支出管理 - 项目收支统计系统{% endblock %}

{% block content %}
<header class="topbar">
  <div>
    <p class="eyebrow">Expense Tracking</p>
    <h1>工具费用支出</h1>
  </div>
  <div class="top-actions">
    <button id="refreshBtn" class="btn secondary" type="button">刷新</button>
  </div>
</header>

<section class="panel form-panel">
  <div class="section-title">
    <div><p class="eyebrow">Expense</p><h2 id="expenseFormTitle">工具费用支出</h2></div>
    <button id="cancelExpenseEditBtn" class="btn secondary small hidden" type="button">取消编辑</button>
  </div>
  <form id="expenseForm" class="expense-form">
    <input type="hidden" id="expenseId">
    <label>费用日期<input id="expense_date" type="date"></label>
    <label>工具 / 用途<input id="expense_name" placeholder="如：服务器 / API / 会员 / 软件"></label>
    <label>费用金额<input id="expense_amount" type="number" step="0.01" value="0"></label>
    <label>备注<input id="expense_note" placeholder="支出说明"></label>
    <button class="btn danger submit" type="submit" id="expenseSubmitBtn">保存支出</button>
  </form>
  <div class="table-wrap expense-wrap">
    <table><thead><tr><th>ID</th><th>费用日期</th><th>工具 / 用途</th><th>金额</th><th>备注</th><th>操作</th></tr></thead><tbody id="expensesBody"></tbody></table>
  </div>
</section>
{% endblock %}
