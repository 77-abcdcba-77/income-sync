{% extends "base.html" %}
{% block title %}收支管理 - 项目收支统计系统{% endblock %}

{% block content %}
<header class="topbar">
  <div>
    <p class="eyebrow">Payment & Budget</p>
    <h1>收支管理</h1>
  </div>
  <div class="top-actions">
    <button id="refreshBtn" class="btn secondary" type="button">刷新</button>
  </div>
</header>

<section class="panel form-panel">
  <div class="section-title">
    <div><p class="eyebrow">Payment & Budget</p><h2>付款 / 追加预算</h2></div>
  </div>
  <label class="full-label">选择订单<select id="selectedOrder"></select></label>
  <div class="mini-summary" id="selectedSummary">请选择订单</div>
  <div class="split-forms">
    <form id="paymentForm" class="mini-form">
      <input type="hidden" id="paymentId">
      <h3 id="paymentFormTitle">记录客户付款</h3>
      <label>付款日期<input id="pay_date" type="date"></label>
      <label>付款金额<input id="payment_amount" type="number" step="0.01" value="0"></label>
      <label>备注<input id="payment_note" placeholder="如：尾款 / 定金 / 补款"></label>
      <button class="btn success submit" type="submit" id="paymentSubmitBtn">保存付款</button>
      <button class="btn secondary small hidden" type="button" id="cancelPaymentEditBtn">取消付款编辑</button>
    </form>
    <form id="adjustmentForm" class="mini-form">
      <input type="hidden" id="adjustmentId">
      <h3 id="adjustmentFormTitle">增加客户预算</h3>
      <label>增加日期<input id="change_date" type="date"></label>
      <label>增加金额<input id="adjustment_amount" type="number" step="0.01" value="0"></label>
      <label>说明<input id="adjustment_note" placeholder="如：增加功能 / 加急费用"></label>
      <button class="btn primary submit" type="submit" id="adjustmentSubmitBtn">保存预算</button>
      <button class="btn secondary small hidden" type="button" id="cancelAdjustmentEditBtn">取消预算编辑</button>
    </form>
  </div>
</section>

<section class="dual-grid">
  <section class="panel table-panel compact-table">
    <div class="section-title"><div><p class="eyebrow">Payments</p><h2>当前订单付款记录</h2></div></div>
    <div class="table-wrap"><table><thead><tr><th>ID</th><th>日期</th><th>金额</th><th>备注</th><th>操作</th></tr></thead><tbody id="paymentsBody"></tbody></table></div>
  </section>
  <section class="panel table-panel compact-table">
    <div class="section-title"><div><p class="eyebrow">Budget</p><h2>当前订单预算记录</h2></div></div>
    <div class="table-wrap"><table><thead><tr><th>ID</th><th>日期</th><th>金额</th><th>说明</th><th>操作</th></tr></thead><tbody id="adjustmentsBody"></tbody></table></div>
  </section>
</section>
{% endblock %}
